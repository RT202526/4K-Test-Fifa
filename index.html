<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RS 4K TV | LIVE SPORTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* আপনার সিএসএস কোড এখানে থাকবে */
        :root { --bg-main: #0B0F19; --surface-card: #131A2A; --accent-blue: #2563EB; --text-primary: #F8FAFC; --text-secondary: #94A3B8; --border-color: rgba(255, 255, 255, 0.07); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-primary); min-height: 100vh; }
        /* বাকি সিএসএস আগের মতোই থাকবে... */
    </style>
</head>
<body>
    <!-- আগের এইচটিএমএল বডি কোড সব এখানে থাকবে -->
    <script>
        let rawServers = [];
        // JSON ফাইল থেকে ডাটা লোড করার ফাংশন
        async function loadChannels() {
            try {
                const response = await fetch('channels.json');
                rawServers = await response.json();
                renderCategories();
                renderChannels();
                playStream(rawServers[0].url, rawServers[0].name);
            } catch (err) { console.error("Error loading channels:", err); }
        }

        // বাকি জাভাস্ক্রিপ্ট কোড...
        document.addEventListener('DOMContentLoaded', loadChannels);
    </script>
</body>
</html>
