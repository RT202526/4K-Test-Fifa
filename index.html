<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RS 4K TV | LIVE SPORTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-main: #0B0F19; --surface-card: #131A2A; --accent-blue: #2563EB; --accent-cyan: #06B6D4; --accent-gold: #F59E0B; --text-primary: #F8FAFC; --text-secondary: #94A3B8; --border-color: rgba(255, 255, 255, 0.07); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-primary); min-height: 100vh; max-width: 100vw; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(11, 15, 25, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-icon { font-size: 1.8rem; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-text { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
        .brand-badge { background: rgba(37, 99, 235, 0.15); color: var(--accent-cyan); font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; font-weight: 700; border: 1px solid rgba(37, 99, 235, 0.3);}
        .container { max-width: 1750px; margin: 24px auto; padding: 0 24px; display: grid; grid-template-columns: 2.3fr 1fr; gap: 24px; }
        .card { background: var(--surface-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .player-box { position: relative; width: 100%; padding-top: 56.25%; background: #05070C; overflow: hidden; border-radius: 16px 16px 0 0;}
        .player-box iframe, .player-box video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        .player-overlay { position: absolute; inset: 0; z-index: 5; background: var(--surface-card); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; transition: opacity 0.3s; pointer-events: none; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border-color); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .channel-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px 24px; max-height: 420px; overflow-y: auto; }
        .btn-channel { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: var(--text-primary); padding: 14px 16px; border-radius: 12px; font-size: 0.95rem; cursor: pointer; text-align: left; }
        .btn-channel.active { background: var(--accent-blue); }
    </style>
</head>
<body>
    <header>
        <a href="#" class="brand"><span class="brand-icon">⚡</span><span class="brand-text">RS 4K TV</span></a>
    </header>
    <main class="container">
        <div class="card">
            <div class="player-box">
                <div id="overlay" class="player-overlay"><div class="spinner"></div><span id="overlay-msg">Connecting...</span></div>
                <iframe id="main-iframe" src="" allowfullscreen allow="autoplay; encrypted-media" style="display:none;"></iframe>
                <video id="main-video" controls autoplay playsinline style="display:none; width:100%; height:100%;"></video>
            </div>
            <div class="channel-grid" id="channel-container"></div>
        </div>
    </main>

    <script>
        let rawServers = [];
        let activeCategory = "All";
        let currentUrl = "";

        const DOM = {
            chanGrid: document.getElementById('channel-container'),
            iframe: document.getElementById('main-iframe'),
            video: document.getElementById('main-video'),
            overlay: document.getElementById('overlay'),
            overlayMsg: document.getElementById('overlay-msg')
        };

        function renderCategories() { /* আপনার ক্যাটাগরি কোড */ }

        function renderChannels() {
            DOM.chanGrid.innerHTML = "";
            rawServers.forEach(s => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.innerHTML = `<button class="btn-channel" onclick="playStream('${s.url}', '${s.name}')">${s.name}</button>`;
                DOM.chanGrid.appendChild(item);
            });
        }

        function showError() { DOM.overlayMsg.textContent = 'Offline/Blocked'; }

        let hls = null;
        function playStream(url, name) {
            DOM.overlay.style.opacity = '1';
            DOM.overlayMsg.textContent = `Tuning into ${name}...`;
            if(hls) { hls.destroy(); hls = null; }
            DOM.video.pause(); DOM.iframe.src = "";

            if(url.includes('.m3u8')) {
                DOM.iframe.style.display = 'none'; DOM.video.style.display = 'block';
                hls = new Hls(); hls.loadSource(url); hls.attachMedia(DOM.video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { DOM.video.play(); DOM.overlay.style.opacity = '0'; });
            } else {
                DOM.video.style.display = 'none'; DOM.iframe.style.display = 'block'; DOM.iframe.src = url;
                DOM.iframe.onload = () => DOM.overlay.style.opacity = '0';
            }
        }

        // সবশেষে ডাটা লোড করুন
        async function loadChannels() {
            try {
                const response = await fetch('./channels.json');
                rawServers = await response.json();
                renderChannels();
                if(rawServers.length) playStream(rawServers[0].url, rawServers[0].name);
            } catch (err) { console.error("Error:", err); }
        }

        document.addEventListener('DOMContentLoaded', loadChannels);
    </script>
</body>
</html>
